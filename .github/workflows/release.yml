name: release-python-sdk

on:
  push:
    tags: ["sdk/py/v*"]

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    outputs:
      provenance-subjects: ${{ steps.provenance-subjects.outputs.subjects }}
    steps:
      - name: Checkout Python SDK
        uses: actions/checkout@v4
        with:
          path: sdk/py
          fetch-depth: 0

      - name: Checkout core
        uses: actions/checkout@v4
        with:
          repository: kave-io/kave
          path: core
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv and sigstore
        run: python -m pip install uv sigstore

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Enforce changelog entry
        working-directory: core
        run: scripts/check-sdk-changelog.sh py "${GITHUB_REF_NAME#sdk/py/}"

      - name: Build sdist and wheel
        working-directory: sdk/py
        run: uv build

      - name: Test wheel in clean container
        working-directory: sdk/py
        run: |
          docker run --rm -v "$PWD:/pkg:ro" python:3.12-slim \
            sh -c 'pip install /pkg/dist/*.whl && python -c "import kave; print(kave.__version__)"'

      - name: Sign packages
        working-directory: sdk/py
        run: python -m sigstore sign --yes dist/*

      - name: Generate SBOMs
        uses: anchore/sbom-action@v0
        with:
          path: sdk/py/dist
          format: spdx-json
          output-file: sdk/py/dist/kave-sdk-python.sbom.spdx.json

      - name: Cosign artifact bundles
        working-directory: sdk/py
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          set -euo pipefail
          for artifact in dist/*; do
            case "$artifact" in
              *.sig|*.pem) continue ;;
            esac
            cosign sign-blob --yes \
              --output-signature="${artifact}.cosign.sig" \
              --output-certificate="${artifact}.cosign.pem" \
              "$artifact"
          done

      - name: Publish to PyPI
        working-directory: sdk/py
        run: uv publish dist/*.whl dist/*.tar.gz --token "$PYPI_API_TOKEN"
        env:
          PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}

      - name: Attach release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            sdk/py/dist/*

      - name: Collect provenance subjects
        id: provenance-subjects
        working-directory: sdk/py
        run: |
          set -euo pipefail
          subjects="$(find dist -maxdepth 1 -type f -print0 | sort -z | xargs -0 sha256sum | base64 -w0)"
          echo "subjects=${subjects}" >> "$GITHUB_OUTPUT"

  provenance:
    needs: publish
    if: needs.publish.outputs.provenance-subjects != ''
    permissions:
      actions: read
      id-token: write
      contents: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
      base64-subjects: ${{ needs.publish.outputs.provenance-subjects }}
      upload-assets: true
